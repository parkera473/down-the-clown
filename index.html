<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Down the Clown</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
      background: radial-gradient(ellipse at 50% 30%, #5a9ec0 0%, #2d6e8a 45%, #1a4a62 100%);
      min-height: 100vh;
      cursor: none;
      overflow: hidden;
      user-select: none;
    }

    #canopy {
      height: 18px;
      background: repeating-linear-gradient(90deg,
        #cc1111 0px, #cc1111 28px, #f5f5f5 28px, #f5f5f5 56px);
      flex-shrink: 0;
      border-bottom: 3px solid #8B0000;
    }

    #ball {
      position: fixed;
      width: 38px; height: 38px;
      background: radial-gradient(circle at 35% 32%, #ff7777, #bb0000 60%, #7a0000);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      box-shadow: 2px 3px 8px rgba(0,0,0,0.5);
    }

    #fly-ball {
      position: fixed;
      width: 38px; height: 38px;
      background: radial-gradient(circle at 35% 32%, #ff7777, #bb0000 60%, #7a0000);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      box-shadow: 2px 3px 8px rgba(0,0,0,0.5);
      display: none;
      transition: left 0.22s ease-in, top 0.22s ease-in;
    }

    #game {
      max-width: 1000px;
      margin: 0 auto;
      padding: 8px 14px 4px;
      height: calc(100vh - 18px);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .hud-pill {
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 999px;
      padding: 5px 16px;
      color: #fff;
      font-size: 14px;
      font-weight: bold;
    }
    .hud-pill span { color: #f5c518; }

    #timer-pill {
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 999px;
      padding: 5px 16px;
      color: #fff;
      font-size: 14px;
      font-weight: bold;
      transition: background 0.3s, border-color 0.3s;
    }
    #timer-pill.danger {
      background: rgba(200,0,0,0.55);
      border-color: #ff4444;
      animation: pulse 0.6s ease infinite alternate;
    }
    @keyframes pulse {
      from { transform: scale(1); }
      to   { transform: scale(1.08); }
    }
    #double-banner {
      display: none;
      text-align: center;
      font-size: 15px;
      font-weight: bold;
      color: #f5c518;
      letter-spacing: 1px;
      flex-shrink: 0;
      animation: pulse 0.5s ease infinite alternate;
    }
    #double-banner.show { display: block; }

    #upload-label {
      background: #f5c518;
      color: #1a1a1a;
      border-radius: 999px;
      padding: 5px 15px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      white-space: nowrap;
    }
    #upload-label:hover { background: #ffd93d; }
    #csv-input { display: none; }

    #download-template {
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 999px;
      padding: 5px 15px;
      color: #fff;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      white-space: nowrap;
    }
    #download-template:hover { background: rgba(255,255,255,0.28); }

    #question-box {
      background: #fff;
      border-radius: 10px;
      padding: 11px 22px;
      text-align: center;
      font-size: clamp(14px, 2.1vw, 20px);
      font-weight: bold;
      color: #111;
      flex-shrink: 0;
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 14px rgba(0,0,0,0.3);
      line-height: 1.4;
    }

    .blank {
      display: inline-block;
      min-width: 100px;
      border-bottom: 3px solid #cc1111;
      margin: 0 6px;
      color: transparent;
    }

    #message {
      text-align: center;
      font-size: 16px;
      font-weight: bold;
      min-height: 20px;
      flex-shrink: 0;
    }

    #clown-grid {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      flex: 1;
      overflow: hidden;
    }

    .shelf-wrap {
      position: relative;
      padding-bottom: 10px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      min-height: 0;
    }
    .shelf-wrap::after {
      content: '';
      position: absolute;
      bottom: 0; left: -14px; right: -14px;
      height: 10px;
      background: linear-gradient(to bottom, #a0622a, #6b3d18);
      border-top: 2px solid #c07840;
    }

    .clown-row {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 8px;
      padding-bottom: 2px;
    }

    .clown-wrap {
      position: relative;
      cursor: none;
      flex-shrink: 0;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
    }

    /* Fall and shake go on the inner img-wrap, NOT clown-wrap,
       so the score card (sibling) stays in place */
    .clown-img-wrap {
      position: relative;
      display: inline-block;
      transform-origin: bottom center;
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.6, 1),
                  opacity 0.55s ease;
    }

    .clown-img-wrap.fallen-left  { transform: rotate(-88deg) translateX(-30%); opacity: 0.15; }
    .clown-img-wrap.fallen-right { transform: rotate(88deg) translateX(30%);   opacity: 0.15; }

    .clown-img-wrap.shake { animation: shake 0.38s ease; }
    @keyframes shake {
      0%   { transform: translateX(0) rotate(0); }
      18%  { transform: translateX(-8px) rotate(-4deg); }
      36%  { transform: translateX(8px) rotate(4deg); }
      54%  { transform: translateX(-5px) rotate(-2deg); }
      72%  { transform: translateX(5px) rotate(2deg); }
      100% { transform: translateX(0) rotate(0); }
    }


    .clown-label {
      width: 100%;
      background: #1a3a8f;
      border: 2px solid #cc2222;
      border-radius: 5px;
      color: white;
      font-weight: bold;
      font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
      text-align: center;
      padding: 3px 4px;
      line-height: 1.2;
      word-break: break-word;
      pointer-events: none;
      margin-top: 3px;
    }

    /* Score card that appears after clown falls */
    .score-card {
      display: none;
      position: absolute;
      top: 0; right: 0; bottom: 0; left: 0;
      background: #0b1e52;
      border: 3px solid #4488ff;
      border-radius: 10px;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #f5c518;
      font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
      z-index: 20;
      flex-direction: column;
      gap: 4px;
    }
    .score-card.visible { display: flex; opacity: 1; transition: opacity 0.8s ease; }
    .score-card.fading  { opacity: 0; }
    #row-0 .score-card { font-size: clamp(14px, 2.4vw, 28px); }
    #row-1 .score-card { font-size: clamp(12px, 1.9vw, 22px); }
    #row-2 .score-card { font-size: clamp(10px, 1.5vw, 18px); }
    .score-card .pts-label { font-size: 0.65em; color: #aac4ff; letter-spacing: 0.5px; }

    /* Welcome screen */
    #welcome-screen {
      display: none;
      position: fixed; top: 0; right: 0; bottom: 0; left: 0;
      background: rgba(0,0,0,0.82);
      z-index: 600;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 20px;
      color: #fff; text-align: center;
    }
    #welcome-screen.show { display: flex; }
    #welcome-title { font-size: clamp(28px, 5vw, 48px); }
    #welcome-sub   { font-size: clamp(14px, 2vw, 18px); color: #cce4ff; max-width: 480px; line-height: 1.5; }
    #welcome-upload-btn {
      background: #f5c518; color: #1a1a1a;
      border: none; border-radius: 999px;
      padding: 14px 40px; font-size: 20px;
      font-weight: bold; cursor: pointer; margin-top: 4px;
    }
    #welcome-upload-btn:hover { background: #ffd93d; }
    #welcome-template-btn {
      background: transparent; color: #aac4ff;
      border: 2px solid #4488ff; border-radius: 999px;
      padding: 10px 28px; font-size: 15px;
      font-weight: bold; cursor: pointer;
    }
    #welcome-template-btn:hover { background: rgba(68,136,255,0.15); }
    #welcome-play-vocab-btn {
      background: #f5c518; color: #1a1a1a;
      border: none; border-radius: 999px;
      padding: 14px 40px; font-size: 20px;
      font-weight: bold; cursor: pointer; margin-top: 4px;
    }
    #welcome-play-vocab-btn:hover { background: #ffd93d; }
    #welcome-play-ah9-btn {
      background: #b22234; color: #fff;
      border: none; border-radius: 999px;
      padding: 14px 40px; font-size: 20px;
      font-weight: bold; cursor: pointer;
    }
    #welcome-play-ah9-btn:hover { background: #cc2a3e; }

    /* End screen */
    #end-screen {
      display: none;
      position: fixed; top: 0; right: 0; bottom: 0; left: 0;
      background: rgba(0,0,0,0.78);
      z-index: 500;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 18px;
      color: #fff; text-align: center;
    }
    #end-screen.show { display: flex; }
    #end-title  { font-size: clamp(22px, 4vw, 36px); }
    #end-score  { font-size: clamp(36px, 7vw, 64px); font-weight: bold; color: #f5c518; }
    #end-max    { font-size: 16px; color: #aaa; }
    #play-again {
      background: #f5c518; color: #1a1a1a;
      border: none; border-radius: 999px;
      padding: 12px 36px; font-size: 20px;
      font-weight: bold; cursor: pointer; margin-top: 6px;
    }
    #play-again:hover { background: #ffd93d; }

document.getElementById('csv-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const parsed = parseCSV(ev.target.result);

      restartGame();
    } else {

    }
  };
  reader.readAsText(file);
});

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  const result = [];
  const firstLow = lines[0].toLowerCase();
  const start = (firstLow.includes('sentence') || firstLow.includes('answer')) ? 1 : 0;
  for (let i = start; i < lines.length; i++) {
    const cols = splitCSVLine(lines[i]);
    if (cols.length < 2) continue;
    const sentence = cols[0].trim(), answer = cols[1].trim();
    if (sentence && answer) result.push({ sentence, answer });
  }
  return result;
}

function splitCSVLine(line) {
  const out = []; let cur = '', inQ = false;
  for (const ch of line) {
    if (ch === '"') { inQ = !inQ; continue; }
    if (ch === ',' && !inQ) { out.push(cur); cur = ''; continue; }
    cur += ch;
  }
  out.push(cur);
  return out;
}

// ── Word pool ──────────────────────────────────────────────────────────────
function buildWordPool() {
  const seen = new Set();
  wordPool = [];
  questions.forEach(q => {
    if (!seen.has(q.answer)) { seen.add(q.answer); wordPool.push(q.answer); }
  });
}

function getDistractors(answer, n) {
  const pool = wordPool.filter(w => w !== answer);
  const out = [];
  while (out.length < n) out.push(...shuffle([...pool]));
  return out.slice(0, n);
}

function randomDistractor(answer) {
  const pool = wordPool.filter(w => w !== answer);
  return pool[Math.floor(Math.random() * pool.length)] || answer;
}

// ── Wire up static clown elements ─────────────────────────────────────────
function initClowns() {
  const bases = [1.9, 1.55, 1.25];
  clownEls = Array.from(document.querySelectorAll('.clown-wrap'));
  clownEls.forEach(el => {
    const rowIdx = parseInt(el.dataset.row);
    el._baseFontVw = bases[rowIdx];
    el.addEventListener('click', () => handleClownClick(el));
    el.addEventListener('touchstart', e => { e.preventDefault(); handleClownClick(el); }, { passive: false });
  });
}

function setWordOnClown(el, word) {
  el.dataset.word = word;
  const label = el.querySelector('.clown-label');
  label.textContent = word;
  let size = el._baseFontVw;
  if (word.length > 13) size *= 0.72;
  else if (word.length > 9) size *= 0.85;
  label.style.fontSize = size.toFixed(2) + 'vw';
}

// ── Assign words once per game ─────────────────────────────────────────────
function assignWords() {
  const answers = questions.map(q => q.answer).slice(0, clownEls.length);
  const words   = shuffle([...answers]);
  clownEls.forEach((el, i) => {
    setWordOnClown(el, words[i] || '');
    if (words[i]) usedWords.add(words[i]);
  });
}

// ── Render round (question only — words never change) ──────────────────────
function renderRound() {
  if (uniqueAnswered.size >= questions.length) { endGame(); return; }

  // Only ask about answers that are visible on a standing clown right now
  const activeWords = new Set(
    clownEls.filter(el => el.dataset.knocked !== 'true').map(el => el.dataset.word)
  );

  const idx = questionQueue.findIndex(q => activeWords.has(q.answer));
  if (idx === -1) {
    showMessage('Waiting for clowns to return…', '#f5c518');
    setTimeout(renderRound, 1500);
    return;
  }
  if (idx > 0) {                          // bubble it to front
    questionQueue.unshift(questionQueue.splice(idx, 1)[0]);
  }

  const q = questionQueue[0];
  document.getElementById('q-num').textContent   = uniqueAnswered.size + 1;
  document.getElementById('q-total').textContent = questions.length;

  document.getElementById('sentence-text').innerHTML = q.sentence.replace(
    '___',
    '<span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>'
  );

  currentAnswer = q.answer;
  locked = false;
}

// ── Handle click ───────────────────────────────────────────────────────────
function handleClownClick(el) {
  if (locked || el.dataset.knocked === 'true') return;

  const word   = el.dataset.word;
  const rowIdx = parseInt(el.dataset.row);

  if (word === currentAnswer) {
    locked = true;
    throwBall(el, () => knockDown(el, rowIdx));
  } else {
    throwBall(el, () => {
      const iw = el.querySelector('.clown-img-wrap');
      iw.classList.remove('shake');
      void iw.offsetWidth;
      iw.classList.add('shake');
      showMessage('Not quite — try again!', '#ff7777');
      locked = false;
    });
  }
}

function knockDown(el, rowIdx) {
  const double = timeLeft <= 15;
  const pts    = ROW_PTS[rowIdx] * (double ? 2 : 1);
  score += pts;
  document.getElementById('score').textContent = score;
  showMessage(double ? `⚡ +${pts} DOUBLE POINTS!` : `+${pts} — Knocked it down!`, '#44dd88');

  const imgWrap = el.querySelector('.clown-img-wrap');
  const card    = el.querySelector('.score-card');

  const dir = Math.random() > 0.5 ? 'fallen-left' : 'fallen-right';
  imgWrap.classList.add(dir);
  el.dataset.knocked = 'true';

  // Score card appears at 3 seconds, stays in place because it's outside imgWrap
  card.innerHTML = `<span>+${pts}</span><span class="pts-label">POINTS</span>`;
  setTimeout(() => card.classList.add('visible'), 3000);
  // Fade out at 10 seconds, hide at 11
  setTimeout(() => card.classList.add('fading'), 10000);
  setTimeout(() => { card.classList.remove('visible', 'fading'); }, 11000);

  // Remove from queue front, track as answered
  const answered = questionQueue.shift();
  uniqueAnswered.add(answered.answer);
  answeredBank.push(answered);

  // Clown respawns at 25 seconds — introduce a new word if available, else recycle
  setTimeout(() => {
    card.classList.remove('visible', 'fading');
    imgWrap.classList.remove('fallen-left', 'fallen-right', 'shake');
    el.dataset.knocked = '';

    const taken = new Set(clownEls.filter(e => e.dataset.knocked !== 'true').map(e => e.dataset.word));

    // Prefer a brand-new word not yet seen on the board
    const freshChoices = questions.filter(q => !usedWords.has(q.answer) && !taken.has(q.answer));
    if (freshChoices.length > 0) {
      const chosen = freshChoices[Math.floor(Math.random() * freshChoices.length)];
      usedWords.add(chosen.answer);
      setWordOnClown(el, chosen.answer);
      const pos = Math.min(1 + Math.floor(Math.random() * 6), questionQueue.length);
      questionQueue.splice(pos, 0, chosen);
    } else if (answeredBank.length > 0) {
      // Fall back to a recycled question whose word isn't already on a standing clown
      const choices = answeredBank.filter(q => !taken.has(q.answer));
      if (choices.length > 0) {
        const recycled = choices[Math.floor(Math.random() * choices.length)];
        setWordOnClown(el, recycled.answer);
        const pos = Math.min(1 + Math.floor(Math.random() * 6), questionQueue.length);
        questionQueue.splice(pos, 0, recycled);
      }
    }
  }, 25000);

  // Advance to next question after short delay
  setTimeout(renderRound, 700);
}

// ── Timer ──────────────────────────────────────────────────────────────────
function startTimer() {
  clearInterval(timerInterval);
  timeLeft = 90;
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft === 15) {
      document.getElementById('timer-pill').classList.add('danger');
      document.getElementById('double-banner').classList.add('show');
    }
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      endGame();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(timeLeft / 60);
  const s = timeLeft % 60;
  document.getElementById('timer').textContent = `${m}:${s.toString().padStart(2, '0')}`;
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
}

// ── Message ────────────────────────────────────────────────────────────────
let msgTimer = null;
function showMessage(text, color) {
  const el = document.getElementById('message');
  el.textContent = text;
  el.style.color = color;
  clearTimeout(msgTimer);
  msgTimer = setTimeout(() => { el.textContent = ''; }, 1800);
}

// ── End / restart ──────────────────────────────────────────────────────────
function endGame() {
  stopTimer();
  document.getElementById('end-score').textContent = score;
  document.getElementById('end-max').textContent   = `${uniqueAnswered.size} of ${questions.length} answered`;
  document.getElementById('end-screen').classList.add('show');
}

function restartGame() {
  if (questions.length === 0) {
    document.getElementById('welcome-screen').classList.add('show');
    return;
  }
  questionQueue  = shuffle([...questions]);
  answeredBank   = [];
  uniqueAnswered = new Set();
  usedWords      = new Set();
  score          = 0;
  locked         = false;
  document.getElementById('score').textContent = '0';
  document.getElementById('end-screen').classList.remove('show');
  document.getElementById('message').textContent = '';

  clownEls.forEach(el => {
    el.querySelector('.clown-img-wrap').classList.remove('fallen-left', 'fallen-right', 'shake');
    el.dataset.knocked = '';
    el.querySelector('.score-card').classList.remove('visible', 'fading');
  });

  document.getElementById('timer-pill').classList.remove('danger');
  document.getElementById('double-banner').classList.remove('show');
  buildWordPool();
  assignWords();
  renderRound();
  startTimer();
}

document.getElementById('play-again').addEventListener('click', () => {
  questions = shuffle([...questions]);
  restartGame();
});

// ── Utility ────────────────────────────────────────────────────────────────
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ── Boot ───────────────────────────────────────────────────────────────────
initClowns();
// Always show the welcome screen so the player can choose which game to play.
</script>
